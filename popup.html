<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网址获取</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <h1>网页链接</h1>
        
        <div class="controls">
            <button id="refreshBtn" class="btn">刷新链接</button>
            <button id="openAllBtn" class="btn primary">打开本页链接</button>
            <button id="optionsBtn" class="btn">⚙️ 配置</button>
        </div>
        
        <!-- 搜索框 -->
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 搜索链接标题或URL..." />
            <span id="searchClearBtn" class="search-clear">✕</span>
        </div>
        
        <div class="stats">
            <div class="stats-detail">
                <span>总计: <span id="totalLinks">0</span></span>
                <span>新链接: <span id="newLinks">0</span></span>
                <span>已打开: <span id="openedLinks">0</span></span>
                <span>已屏蔽: <span id="blockedLinks">0</span></span>
            </div>
        </div>
        
        <!-- 批量操作工具栏（选中链接时显示） -->
        <div id="bulkActionsBar" class="bulk-actions-bar" style="display:none;">
            <span id="selectedCount" class="selected-count">已选 0 项</span>
            <div class="bulk-actions">
                <button id="bulkBlockBtn" class="btn-sm btn-danger">🚫 批量屏蔽</button>
                <button id="bulkBlockDomainBtn" class="btn-sm btn-warning">🌐 屏蔽域名</button>
                <button id="bulkCopyBtn" class="btn-sm">📋 批量复制</button>
                <button id="bulkOpenBtn" class="btn-sm btn-primary-sm">🔗 批量打开</button>
            </div>
        </div>
        
        <div id="linksContainer" class="links-container">
            <!-- 链接列表将在这里动态生成 -->
            <div class="empty-state">正在获取链接...</div>
        </div>
        
        <div class="pagination">
            <button id="prevBtn" class="btn">上一页</button>
            <span id="pageInfo">第 1 页 / 共 1 页</span>
            <button id="nextBtn" class="btn">下一页</button>
        </div>
        
        <!-- 已屏蔽链接快捷管理 -->
        <div id="blockedUrlsBar" class="blocked-domains-bar" style="display:none;">
            <div class="blocked-domains-header">
                <span>🚫 已屏蔽链接</span>
                <button id="clearBlockedBtn" class="btn-link">清空</button>
            </div>
            <div id="blockedUrlsTags" class="blocked-domains-tags"></div>
        </div>
        
        <div class="footer">
            <div class="footer-options">
                <label class="checkbox">
                    <input type="checkbox" id="autoOpenCheckbox">
                    <span>自动将已打开的链接移到末尾</span>
                </label>
                <label class="checkbox">
                    <input type="checkbox" id="hideOpenedCheckbox" checked>
                    <span>隐藏已打开的链接</span>
                </label>
            </div>
        </div>
    </div>
    
    <!-- Toast 通知 -->
    <div id="toast" class="toast"></div>
    
    <script src="popup.js"></script>
</body>
</html>
