<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图标预览</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }
        h1 {
            margin-bottom: 40px;
            font-weight: 300;
            letter-spacing: 2px;
        }
        .icon-grid {
            display: flex;
            gap: 60px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            padding: 40px;
        }
        .icon-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .icon-wrapper {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .icon-wrapper img {
            display: block;
        }
        .icon-label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .usage-examples {
            margin-top: 60px;
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .usage-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px 25px;
            border-radius: 30px;
        }
        .toolbar-sim {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #333;
            padding: 8px 16px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>🔗 WebLinkSniffer 图标预览</h1>
    
    <div class="icon-grid">
        <div class="icon-item">
            <div class="icon-wrapper">
                <img src="icon16.png" alt="16x16">
            </div>
            <span class="icon-label">16px - 工具栏图标</span>
        </div>
        <div class="icon-item">
            <div class="icon-wrapper">
                <img src="icon48.png" alt="48x48">
            </div>
            <span class="icon-label">48px - 扩展管理页</span>
        </div>
        <div class="icon-item">
            <div class="icon-wrapper">
                <img src="icon128.png" alt="128x128">
            </div>
            <span class="icon-label">128px - 商店展示</span>
        </div>
    </div>

    <div class="usage-examples">
        <div class="usage-item">
            <img src="icon16.png" alt="toolbar">
            <span>浏览器工具栏效果</span>
        </div>
    </div>
</body>
</html>
